<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1706 Opportunity CRM</title>
  <style>
    :root{
      --bg:#f7f4ef; --ink:#12110f; --muted:#6d6860; --card:#fffdf8; --line:#ded7cc;
      --accent:#111; --green:#1f7a4d; --amber:#a66b00; --red:#a43b34; --blue:#2457a6;
      --shadow:0 18px 50px rgba(18,17,15,.08);
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:36px 42px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(247,244,239,.88);backdrop-filter:blur(14px);z-index:5}
    .top{display:flex;justify-content:space-between;gap:24px;align-items:flex-start}.eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700}
    h1{font-family:Georgia, 'Times New Roman', serif;font-size:clamp(38px,6vw,82px);line-height:.92;margin:10px 0 0;letter-spacing:-.06em}.subtitle{max-width:720px;color:var(--muted);font-size:17px;line-height:1.5;margin-top:18px}
    button,input,select,textarea{font:inherit}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:999px;padding:10px 15px;cursor:pointer;font-weight:750}.btn.secondary{background:transparent;color:var(--ink)}.btn.ghost{border-color:var(--line);background:var(--card);color:var(--ink)}
    main{padding:28px 42px 60px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:20px}.stat{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.stat b{font-size:34px}.stat span{display:block;color:var(--muted);font-size:13px;margin-top:6px}
    .toolbar{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}.toolbar input,.toolbar select{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:11px 14px;min-width:180px}.toolbar input{flex:1;min-width:260px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;min-height:320px}.card.hot{border-color:#191714}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.company{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:800}.title{font-family:Georgia,serif;font-size:28px;letter-spacing:-.04em;line-height:1.02;margin-top:6px}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800;background:#fff}.stage{color:#fff;border:0}.Lead{background:var(--blue)}.Proposal{background:var(--amber)}.Active{background:var(--green)}.Stalled{background:var(--red)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.meta div{background:#f6f1e8;border-radius:15px;padding:10px}.meta small{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.meta strong{display:block;margin-top:3px}.notes{color:#3d3932;line-height:1.45;font-size:14px;white-space:pre-wrap}.next{border-top:1px solid var(--line);padding-top:12px;margin-top:auto}.next b{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}.cardActions{display:flex;gap:8px}.cardActions button{flex:1;border:1px solid var(--line);background:transparent;border-radius:12px;padding:8px;cursor:pointer;font-weight:750}
    dialog{border:0;border-radius:28px;box-shadow:0 30px 100px rgba(0,0,0,.3);max-width:720px;width:calc(100% - 28px);background:var(--card);padding:0}dialog::backdrop{background:rgba(0,0,0,.35)}.modal{padding:26px}.modal h2{font-family:Georgia,serif;font-size:42px;margin:0 0 18px;letter-spacing:-.04em}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.form input,.form select,.form textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}.form textarea{min-height:92px}.modalActions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    @media(max-width:1050px){.grid{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){header,main{padding-left:18px;padding-right:18px}.top{display:block}.actions{justify-content:flex-start;margin-top:18px}.grid,.stats{grid-template-columns:1fr}.form{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><div class="top"><div><div class="eyebrow">1706 Studios · Opportunity CRM</div><h1>Deals, talks, wedges.</h1><p class="subtitle">A simple live board for warm opportunities: who, value, stage, next action and what needs chasing. Built for speed, not bureaucracy.</p></div><div class="actions"><button class="btn" onclick="openModal()">Add opportunity</button><button class="btn secondary" onclick="exportJSON()">Export JSON</button><button class="btn ghost" onclick="resetSeed()">Reset seed</button></div></div></header>
<main><section class="stats" id="stats"></section><section class="toolbar"><input id="search" placeholder="Search company, contact, notes..." oninput="render()"><select id="stageFilter" onchange="render()"><option value="">All stages</option><option>Lead</option><option>Proposal</option><option>Active</option><option>Stalled</option></select><select id="typeFilter" onchange="render()"><option value="">All types</option><option>Speaking</option><option>Advisory</option><option>Workshop</option><option>Retainer</option></select><select id="sort" onchange="render()"><option value="updated">Recently updated</option><option value="value">Value high to low</option><option value="date">Date soonest</option></select></section><section class="grid" id="cards"></section></main>
<dialog id="oppDialog"><form method="dialog" class="modal" onsubmit="saveOpp(event)"><h2 id="modalTitle">Add opportunity</h2><input type="hidden" id="id"><div class="form"><div class="field"><label>Opportunity</label><input id="name" required></div><div class="field"><label>Company</label><input id="company" required></div><div class="field"><label>Contact</label><input id="contact"></div><div class="field"><label>Type</label><select id="type"><option>Speaking</option><option>Advisory</option><option>Workshop</option><option>Retainer</option></select></div><div class="field"><label>Stage</label><select id="stage"><option>Lead</option><option>Proposal</option><option>Active</option><option>Stalled</option></select></div><div class="field"><label>Estimated value</label><input id="value" type="number" min="0" step="500"></div><div class="field"><label>Key date</label><input id="date" type="date"></div><div class="field"><label>Owner</label><input id="owner" value="Craig"></div><div class="field full"><label>Next action</label><input id="nextAction"></div><div class="field full"><label>Notes</label><textarea id="notes"></textarea></div></div><div class="modalActions"><button type="button" class="btn ghost" onclick="oppDialog.close()">Cancel</button><button class="btn">Save</button></div></form></dialog>
<script>
const seed=[
{id:'puma',name:'PUMA leadership AI talk',company:'PUMA SE',contact:'Nadia Kokni',type:'Speaking',stage:'Lead',value:7500,date:'2026-06-22',owner:'Craig',nextAction:'Reply with availability and shape a leadership inspiration session for Paris offsite or sales conference.',notes:'Warm senior brand route via Nadia, VP Brand Marketing. Digital education and inspiration for leadership team. Bigger wedge: AI enablement for brand, marketing ops and agentic workflows.',updated:'2026-05-28'},
{id:'jussi',name:'AI transformation engagement',company:'Jussi company TBC',contact:'Jussi',type:'Advisory',stage:'Proposal',value:30000,date:'',owner:'Craig',nextAction:'Wait for Jussi raw notes, then convert into a 3-phase paid engagement: 1:1, marketing team day, retainer plan.',notes:'Old colleague. European operation, US post-acquisition, lead engine, team culture. Strong retainer potential across content architecture, sales enablement, agent-era discoverability and upskilling.',updated:'2026-05-28'},
{id:'sportsbiz',name:'Sports business data and AI talk',company:'Sports Business event TBC',contact:'Sadie',type:'Speaking',stage:'Lead',value:5000,date:'2026-07-08',owner:'Craig',nextAction:'Send working title, agenda copy, takeaways and recommended interview + technical visuals format.',notes:'Audience includes leagues and venues. Strong brand and lead-gen opportunity. Use LiveLike/sports credibility. Position around data becoming operational intelligence in sport.',updated:'2026-05-28'},
{id:'coolmore',name:'AI data moat phase 2',company:'Coolmore',contact:'Arian / team',type:'Workshop',stage:'Active',value:50000,date:'',owner:'Jez/Ollie, Craig looped',nextAction:'Stay looped but do not own chase. Frame next phase as proprietary data moat amplifier.',notes:'Phase 1 secured. Strong proprietary racing data moat. Craig should avoid becoming delivery lead.',updated:'2026-05-28'},
{id:'scottish-rugby',name:'Sovereign AI workshop',company:'Scottish Rugby Union',contact:'Andy',type:'Workshop',stage:'Stalled',value:30000,date:'',owner:'Craig / RAIN',nextAction:'On hold until Andy comes back. Do not chase hard for now.',notes:'High-potential sports opportunity but currently on hold because Craig has not heard back from Andy.',updated:'2026-05-28'}
];
let opps=JSON.parse(localStorage.getItem('opps')||'null')||seed; const save=()=>localStorage.setItem('opps',JSON.stringify(opps));
function money(n){return n?new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP',maximumFractionDigits:0}).format(n):'TBC'}
function days(d){if(!d)return 'No date';let x=Math.ceil((new Date(d)-new Date())/86400000);return x<0?'Past':x===0?'Today':x+' days'}
function filtered(){let q=search.value.toLowerCase(), st=stageFilter.value, ty=typeFilter.value;let arr=opps.filter(o=>(!st||o.stage===st)&&(!ty||o.type===ty)&&JSON.stringify(o).toLowerCase().includes(q));if(sort.value==='value')arr.sort((a,b)=>(b.value||0)-(a.value||0));else if(sort.value==='date')arr.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));else arr.sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));return arr}
function render(){let arr=filtered();let total=opps.reduce((s,o)=>s+(+o.value||0),0), hot=opps.filter(o=>['Lead','Proposal','Active'].includes(o.stage)).length;stats.innerHTML=`<div class="stat"><b>${opps.length}</b><span>Total opportunities</span></div><div class="stat"><b>${money(total)}</b><span>Indicative pipeline</span></div><div class="stat"><b>${hot}</b><span>Live / warm</span></div><div class="stat"><b>${opps.filter(o=>o.type==='Speaking').length}</b><span>Speaking wedges</span></div>`;cards.innerHTML=arr.map(o=>`<article class="card ${o.stage==='Proposal'||o.stage==='Active'?'hot':''}"><div class="row"><div><div class="company">${o.company}</div><div class="title">${o.name}</div></div><span class="pill stage ${o.stage}">${o.stage}</span></div><div><span class="pill">${o.type}</span> <span class="pill">${o.contact||'Contact TBC'}</span></div><div class="meta"><div><small>Value</small><strong>${money(o.value)}</strong></div><div><small>Timing</small><strong>${days(o.date)}</strong></div></div><div class="notes">${o.notes||''}</div><div class="next"><b>Next action</b>${o.nextAction||'Define next action'}</div><div class="cardActions"><button onclick="editOpp('${o.id}')">Edit</button><button onclick="advance('${o.id}')">Advance</button><button onclick="removeOpp('${o.id}')">Delete</button></div></article>`).join('')||'<p>No matches.</p>'}
function openModal(){modalTitle.textContent='Add opportunity';['id','name','company','contact','value','date','nextAction','notes'].forEach(x=>document.getElementById(x).value='');owner.value='Craig';type.value='Speaking';stage.value='Lead';oppDialog.showModal()}
function editOpp(idv){let o=opps.find(x=>x.id===idv);modalTitle.textContent='Edit opportunity';for(let k of ['id','name','company','contact','type','stage','value','date','owner','nextAction','notes'])document.getElementById(k).value=o[k]||'';oppDialog.showModal()}
function saveOpp(e){e.preventDefault();let o={};for(let k of ['id','name','company','contact','type','stage','value','date','owner','nextAction','notes'])o[k]=document.getElementById(k).value;o.id=o.id||crypto.randomUUID();o.value=+o.value||0;o.updated=new Date().toISOString().slice(0,10);let i=opps.findIndex(x=>x.id===o.id);i>=0?opps[i]=o:opps.push(o);save();oppDialog.close();render()}
function advance(id){let order=['Lead','Proposal','Active','Stalled'];let o=opps.find(x=>x.id===id);o.stage=order[(order.indexOf(o.stage)+1)%order.length];o.updated=new Date().toISOString().slice(0,10);save();render()}
function removeOpp(id){if(confirm('Delete this opportunity?')){opps=opps.filter(o=>o.id!==id);save();render()}}
function resetSeed(){if(confirm('Reset to seed opportunities?')){opps=seed;save();render()}}
function exportJSON(){let blob=new Blob([JSON.stringify(opps,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='1706-opportunities.json';a.click()}
render();
</script>
</body>
</html>
